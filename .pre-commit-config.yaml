repos:
- repo: https://github.com/pre-commit/pre-commit-hooks
  rev: v5.0.0
  hooks:
    - id: trailing-whitespace
    - id: check-merge-conflict
    - id: end-of-file-fixer
    - id: check-added-large-files
    - id: check-case-conflict
    - id: check-json
    - id: check-symlinks
    - id: detect-private-key

- repo: https://github.com/adrienverge/yamllint.git
  rev: v1.35.1
  hooks:
    - id: yamllint
      exclude: "^config/"
      files: \.(yaml|yml)$
      types: [file, yaml]
      entry: yamllint --strict

- repo: local
  hooks:
  - id: golangci-lint
    pass_filenames: false
    name: golangci-lint
    language: system
    files: \.go$
    entry: bin/golangci-lint run --fix

  - id: kustomize-build
    name: validate kustomize build
    entry: bash -c 'bin/kustomize build config/default > /dev/null'
    language: system
    pass_filenames: false
    stages: [pre-push]

  - id: check-generated
    name: check generated code is up to date
    entry: bash -c 'make manifests generate && git diff --exit-code config/crd/ config/rbac/role.yaml api/v1alpha1/zz_generated.deepcopy.go'
    language: system
    pass_filenames: false
    stages: [pre-push]
