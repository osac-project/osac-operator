version: "2"
run:
  allow-parallel-runners: true
linters:
  default: none
  enable:
    - dupl
    - errcheck
    - ginkgolinter
    - goconst
    - gocyclo
    - govet
    - ineffassign
    - lll
    - misspell
    # nakedret
    - prealloc
    - revive
    - staticcheck
    - unconvert
    # unparam
    - unused
  settings:
    goconst:
      ignore-tests: true
    revive:
      rules:
        - name: comment-spacings
    staticcheck:
      checks:
        - all
        - "-QF1008"
  exclusions:
    generated: lax
    rules:
      # Long lines in controller/pkg code come from structured logging, K8s API calls,
      # and gRPC type names — breaking them hurts readability more than the length
      - linters:
          - lll
        path: (internal/|pkg/)
      # Feedback controllers share a reconcile skeleton by design (dual-controller pattern)
      - linters:
          - dupl
        path: internal/controller/
      # Test duplication is intentional — each test should be self-contained and readable
      - linters:
          - dupl
        path: _test\.go
    paths:
      - third_party$
      - builtin$
      - examples$
formatters:
  enable:
    - gofmt
    - goimports
  exclusions:
    generated: lax
    paths:
      - third_party$
      - builtin$
      - examples$
