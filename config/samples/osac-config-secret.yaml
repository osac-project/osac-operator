# Example Secret for osac-operator configuration
# This secret contains environment variables for the operator
apiVersion: v1
kind: Secret
metadata:
  name: osac-config
  namespace: osac-operator-system
type: Opaque
stringData:
  # =========================================================================
  # Provisioning Provider Selection
  # =========================================================================
  # Selects which provisioning provider to use for ClusterOrder, ComputeInstance,
  # and HostPool controllers: "eda" or "aap" (default: "aap").
  # Networking controllers (VirtualNetwork, Subnet, SecurityGroup) always use AAP
  # regardless of this setting.
  # OSAC_PROVISIONING_PROVIDER: "aap"

  # =========================================================================
  # EDA Provider Configuration (when OSAC_PROVISIONING_PROVIDER=eda)
  # =========================================================================
  # Webhook URLs for each resource type
  # OSAC_CLUSTER_CREATE_WEBHOOK: "https://eda.example.com/webhook/cluster/create"
  # OSAC_CLUSTER_DELETE_WEBHOOK: "https://eda.example.com/webhook/cluster/delete"
  # OSAC_HOSTPOOL_PROVISION_WEBHOOK: "https://eda.example.com/webhook/hostpool/provision"
  # OSAC_HOSTPOOL_DEPROVISION_WEBHOOK: "https://eda.example.com/webhook/hostpool/deprovision"
  # OSAC_COMPUTE_INSTANCE_PROVISION_WEBHOOK: "https://eda.example.com/webhook/compute/provision"
  # OSAC_COMPUTE_INSTANCE_DEPROVISION_WEBHOOK: "https://eda.example.com/webhook/compute/deprovision"

  # =========================================================================
  # AAP Provider Configuration (when OSAC_PROVISIONING_PROVIDER=aap)
  # =========================================================================
  # AAP server URL (required)
  # OSAC_AAP_URL: "https://aap.example.com"

  # AAP authentication token (required)
  # OSAC_AAP_TOKEN: "your-aap-token-here"

  # Default AAP template names for provisioning/deprovisioning (optional)
  # OSAC_AAP_PROVISION_TEMPLATE: "provision-compute-instance"
  # OSAC_AAP_DEPROVISION_TEMPLATE: "deprovision-compute-instance"

  # Per-resource AAP template overrides (optional, override the shared defaults)
  # OSAC_CLUSTER_AAP_PROVISION_TEMPLATE: "provision-cluster"
  # OSAC_CLUSTER_AAP_DEPROVISION_TEMPLATE: "deprovision-cluster"
  # OSAC_HOSTPOOL_AAP_PROVISION_TEMPLATE: "provision-hostpool"
  # OSAC_HOSTPOOL_AAP_DEPROVISION_TEMPLATE: "deprovision-hostpool"

  # Prefix for convention-based template name resolution (default: "osac")
  # Used by all AAP-backed controllers to derive template names from resource Kind:
  #   {prefix}-create-{kind-kebab} / {prefix}-delete-{kind-kebab}
  # Examples: "osac-create-cluster-order", "osac-delete-compute-instance",
  #           "osac-create-virtual-network", "osac-delete-subnet"
  # Per-resource template overrides (above) take precedence when set.
  # OSAC_AAP_TEMPLATE_PREFIX: "osac"

  # How often to poll AAP for job status (optional, default: 30s)
  # Accepts duration strings like "30s", "1m", "2m30s"
  # OSAC_AAP_STATUS_POLL_INTERVAL: "30s"

  # Skip TLS verification for AAP (optional, default: false)
  # OSAC_AAP_INSECURE_SKIP_VERIFY: "false"

  # =========================================================================
  # Fulfillment Service Integration
  # =========================================================================
  # OSAC_FULFILLMENT_SERVER_ADDRESS: "fulfillment-service:50051"
  # OSAC_FULFILLMENT_TOKEN_FILE: "/var/run/secrets/tokens/fulfillment-token"

  # =========================================================================
  # Other Configuration
  # =========================================================================
  # Minimum duration between calls to the same webhook URL (default: 0)
  # OSAC_MINIMUM_REQUEST_INTERVAL: "2m"

  # Maximum number of job history entries per resource (default: 10)
  # OSAC_MAX_JOB_HISTORY: "10"
