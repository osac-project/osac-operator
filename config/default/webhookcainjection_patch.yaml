# This patch adds cert-manager CA injection annotation to the
# ValidatingWebhookConfiguration so that cert-manager can inject
# the CA bundle into the webhook configuration.
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: validating-webhook-configuration
  annotations:
    cert-manager.io/inject-ca-from: CERTIFICATE_NAMESPACE/CERTIFICATE_NAME
