---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.0
  name: hosts.osac.openshift.io
spec:
  group: osac.openshift.io
  names:
    kind: Host
    listKind: HostList
    plural: hosts
    singular: host
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Host is the Schema for the hosts API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: HostSpec defines the desired state of Host.
            properties:
              hostClass:
                description: HostClass is the resource class of the host.
                type: string
                x-kubernetes-validations:
                - message: field is immutable
                  rule: self == oldSelf
              hostManagementClass:
                description: HostManagementClass is set by the Host Inventory Operator
                  (e.g. openstack).
                type: string
              id:
                description: ID is the host ID from inventory (used by Host Management
                  Operator as node identifier).
                format: uuid
                type: string
                x-kubernetes-validations:
                - message: field is immutable once set
                  rule: oldSelf == '' || self == oldSelf
              name:
                description: Name is the host name from inventory.
                type: string
                x-kubernetes-validations:
                - message: field is immutable once set
                  rule: oldSelf == '' || self == oldSelf
              networkClass:
                description: NetworkClass is the network class for this host (e.g.
                  openstack).
                type: string
              networkInterfaces:
                description: NetworkInterfaces lists the host's network interfaces
                  with desired network binding.
                items:
                  description: NetworkInterfaceSpec describes a desired network interface
                    and its network binding.
                  properties:
                    macAddress:
                      description: MACAddress is the interface MAC address.
                      type: string
                    network:
                      description: Network is the network to attach this interface
                        to (e.g. private-vlan-network).
                      type: string
                  type: object
                type: array
              online:
                description: Online is the desired power state (true = on, false =
                  off).
                type: boolean
              provisioning:
                description: |-
                  Provisioning holds the desired host state and
                  when active, image-based URL and provisioning network (e.g. external).
                properties:
                  provisioningNetwork:
                    description: ProvisioningNetwork identifies the provisioning network.
                    type: string
                  provisioningState:
                    description: 'ProvisioningState is the desired provisioning outcome:
                      active (deployed) or available (in pool).'
                    enum:
                    - active
                    - available
                    type: string
                  url:
                    description: URL is set when state is active for image-based provisioning.
                    type: string
                type: object
                x-kubernetes-validations:
                - message: when provisioningState is active, url and provisioningNetwork
                    must be set
                  rule: self.provisioningState != 'active' || (size(self.url) > 0
                    && size(self.provisioningNetwork) > 0)
              selector:
                description: |-
                  Selector defines additional host selection filters.
                  hostSelector accepts arbitrary key/value selectors such as managedBy or topology.
                properties:
                  hostSelector:
                    additionalProperties:
                      type: string
                    description: |-
                      HostSelector is a map of arbitrary selector key/value pairs
                      (for example managedBy, topology, rack, zone).
                    type: object
                type: object
                x-kubernetes-validations:
                - message: field is immutable
                  rule: self == oldSelf
              templateID:
                description: TemplateID is the unique identifier of the host template
                  to use.
                pattern: ^[a-zA-Z_][a-zA-Z0-9._]*$
                type: string
              templateParameters:
                description: |-
                  TemplateParameters is a JSON-encoded map of the parameter values for the
                  selected host template.
                type: string
            required:
            - hostClass
            - id
            - name
            - online
            - templateID
            type: object
          status:
            description: HostStatus defines the observed state of Host.
            properties:
              conditions:
                description: Conditions holds an array of metav1.Condition describing
                  host state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              jobs:
                description: |-
                  Jobs tracks the history of provision and deprovision operations
                  Ordered chronologically, with latest operations at the end
                  Limited to the last N jobs (configurable via OSAC_MAX_JOB_HISTORY, default 10)
                items:
                  description: JobStatus represents the status of a provisioning or
                    deprovisioning job
                  properties:
                    blockDeletionOnFailure:
                      description: |-
                        BlockDeletionOnFailure indicates whether CR deletion should be blocked if this job fails
                        AAP Direct sets this to true to prevent orphaned cloud resources
                        EDA sets this to false as webhook handles cleanup
                      type: boolean
                    configVersion:
                      description: |-
                        ConfigVersion is the DesiredConfigVersion at the time this job was triggered.
                        Used to determine retry behavior on failure: if ConfigVersion differs from
                        the current DesiredConfigVersion, a new job is triggered immediately.
                        If they match, the controller retries with exponential backoff.
                      type: string
                    jobID:
                      description: |-
                        JobID is the job identifier from the provisioning provider
                        For AAP Direct: job ID from AAP API response
                        For EDA: auto-incremented "eda-webhook-N"
                      type: string
                    message:
                      description: Message provides human-readable status or error
                        information
                      type: string
                    state:
                      description: State is the current state of the job
                      enum:
                      - Pending
                      - Waiting
                      - Running
                      - Succeeded
                      - Failed
                      - Canceled
                      - Unknown
                      type: string
                    timestamp:
                      description: Timestamp when this job was created/triggered
                      format: date-time
                      type: string
                    type:
                      description: Type indicates the operation type
                      enum:
                      - provision
                      - deprovision
                      type: string
                  required:
                  - jobID
                  - state
                  - timestamp
                  - type
                  type: object
                type: array
              networkInterfaces:
                description: NetworkInterfaces lists the host's network interfaces
                  (from inventory or observed).
                items:
                  description: NetworkInterfaceStatus describes an observed network
                    interface.
                  properties:
                    macAddress:
                      description: MACAddress is the interface MAC address.
                      type: string
                  type: object
                type: array
              poweredOn:
                description: PoweredOn is the current power state.
                type: boolean
              provisioning:
                description: Provisioning holds current provisioning URL and state
                  from the backend.
                properties:
                  provisioningState:
                    description: ProvisioningState is the current provisioning state
                      (e.g. active).
                    type: string
                  url:
                    description: URL is the URL of the currently provisioned image.
                    type: string
                type: object
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
