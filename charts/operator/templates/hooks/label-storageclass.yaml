{{- if .Values.tenants }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "osac-operator.fullname" . }}-label-sc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "osac-operator.fullname" . }}-label-sc
  labels:
    {{- include "osac-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
rules:
- apiGroups:
  - storage.k8s.io
  resources:
  - storageclasses
  verbs:
  - get
  - list
  - patch
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "osac-operator.fullname" . }}-label-sc
  labels:
    {{- include "osac-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "osac-operator.fullname" . }}-label-sc
subjects:
- kind: ServiceAccount
  name: {{ include "osac-operator.fullname" . }}-label-sc
  namespace: {{ .Release.Namespace }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "osac-operator.fullname" . }}-label-sc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-operator.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: pre-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 120
  template:
    metadata:
      labels:
        {{- include "osac-operator.selectorLabels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      serviceAccountName: {{ include "osac-operator.fullname" . }}-label-sc
      containers:
      - name: label-sc
        image: {{ .Values.bootstrap.cliImage }}
        command:
        - /bin/bash
        - -ce
        - |
          SC=$(oc get sc -o jsonpath='{.items[?(@.metadata.annotations.storageclass\.kubernetes\.io/is-default-class=="true")].metadata.name}')
          [[ -z "${SC}" ]] && echo "ERROR: No default StorageClass found" && exit 1
          echo "Labeling default StorageClass: ${SC}"
          oc label sc "${SC}" osac.openshift.io/tenant=Default osac.openshift.io/storage-tier=default --overwrite
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - "ALL"
{{- end }}
