apiVersion: v1
kind: Service
metadata:
  name: {{ include "osac-operator.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "osac-operator.labels" . | nindent 4 }}
spec:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: 8443
  selector:
    {{- include "osac-operator.selectorLabels" . | nindent 4 }}
