apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "osac-operator.fullname" . }}-clusterorder-editor
  labels:
    {{- include "osac-operator.labels" . | nindent 4 }}
rules:
- apiGroups:
  - osac.openshift.io
  resources:
