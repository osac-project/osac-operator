image:
  repository: ghcr.io/osac-project/osac-operator
  tag: latest
  pullPolicy: Always

replicaCount: 1

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

aap:
  url: ""
  token: ""
  insecureSkipVerify: "true"
  statusPollInterval: "30s"
  templatePrefix: "osac"

fulfillment:
  serverAddress: ""
  tokenFile: ""

controllers:
  clusterOrder: true
  computeInstance: true
  tenant: true
  networking: true
  bareMetalInstance: true
  storage: true

configSecret:
  name: "osac-config"
  optional: true

serviceAccount:
  create: true
  name: ""

consoleProxy:
  vmClusterMode: auto
  resources:
    limits:
      cpu: 500m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi

certs:
  issuerRef:
    kind: ClusterIssuer
    name: default-ca

bootstrap:
  cliImage: quay.io/openshift/origin-cli:4.20.0

hubAccess:
  enabled: false

tenants: []
