---
name: E2E VMaaS Full Install

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
    inputs:
      test-suite:
        description: "Test suite (vmaas, caas, or empty for all)"
        required: false
        default: "vmaas"
      test-filter:
        description: "pytest -k filter"
        required: false
        default: ""
      test-infra-ref:
        description: "Branch/ref of osac-test-infra"
        required: false
        default: "main"

concurrency:
  group: e2e-vmaas-full-install-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      should-run: ${{ github.event_name != 'pull_request' || steps.filter.outputs.code == 'true' }}
    steps:
      - uses: dorny/paths-filter@v3
        if: github.event_name == 'pull_request'
        id: filter
        with:
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**'
              - '!OWNERS'
              - '!LICENSE'
              - '!*.md'
              - '!docs/**'
              - '!.github/workflows/**'

  e2e-vmaas-full-install:
    needs: changes
    if: needs.changes.outputs.should-run == 'true'
    uses: osac-project/osac-test-infra/.github/workflows/e2e-vmaas-full-install.yml@main
    with:
      test-suite: ${{ inputs.test-suite || 'vmaas' }}
      test-filter: ${{ inputs.test-filter || '' }}
      # Build the component image from the PR's fork/branch
      component-repo: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
      component-ref: ${{ github.event.pull_request.head.ref || github.ref_name }}
      component-image-key: operator.image.repository
      # Pass author_association for fork PR authorization (empty for non-fork PRs)
      fork-pr-author-association: ${{ github.event.pull_request.head.repo.fork && github.event.pull_request.author_association || '' }}
      fork-pr-author: ${{ github.event.pull_request.head.repo.fork && github.event.pull_request.user.login || '' }}
      pr-number: ${{ github.event.pull_request.number }}
      # Checkout osac-test-infra for tests/Containerfile (not the caller repo)
      test-infra-repository: osac-project/osac-test-infra
      test-infra-ref: ${{ inputs.test-infra-ref || 'main' }}

  e2e:
    if: always()
    needs: [changes, e2e-vmaas-full-install]
    runs-on: ubuntu-latest
    steps:
      - run: |
          if [[ "${{ needs.e2e-vmaas-full-install.result }}" == "failure" ]]; then
            exit 1
          fi
